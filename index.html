<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChromeVault</title>
  <style>
    body {
      font-family: monospace;
      background: #f5f5f5;
      color: #222;
      max-width: 460px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 12px;
      color: #888;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #444;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 9px 10px;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 3px;
      margin-bottom: 12px;
      background: #fff;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #888;
    }

    button {
      font-family: monospace;
      font-size: 13px;
      padding: 8px 16px;
      border: 1px solid #aaa;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
    }

    button:hover { background: #eee; }

    button.primary {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    button.primary:hover { background: #444; }

    button.danger {
      color: #c00;
      border-color: #c00;
      font-size: 12px;
    }

    button.danger:hover { background: #fff0f0; }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 24px 0;
    }

    .section h2 {
      font-size: 13px;
      font-weight: normal;
      color: #666;
      margin-bottom: 14px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 5px;
    }

    .file-name {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    .msg {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 3px;
      margin-top: 10px;
      display: none;
    }

    .msg.show { display: block; }
    .msg.ok  { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .msg.err { background: #fdecea; color: #c62828; border: 1px solid #ffcdd2; }

    .warning-box {
      font-size: 12px;
      background: #fffbe6;
      border: 1px solid #ffe082;
      border-radius: 3px;
      padding: 10px 12px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .status {
      font-size: 11px;
      color: #888;
      margin-bottom: 20px;
    }

    .status span { color: #2e7d32; }

    .preview-wrap { display: none; margin-top: 12px; }
    .preview-wrap.show { display: block; }
    .preview-wrap img {
      max-width: 100%;
      border: 1px solid #ddd;
      border-radius: 3px;
      display: block;
    }
    .preview-name {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }

    #setupScreen  { display: none; }
    #unlockScreen { display: none; }
    #mainApp      { display: none; }
  </style>
</head>
<body>

  <h1>🔐 ChromeVault</h1>
  <p class="sub">encrypt photos before saving to google drive</p>

  <!-- ───────────────────────── -->
  <!-- SETUP (first time only)  -->
  <!-- ───────────────────────── -->
  <div id="setupScreen">

    <div class="warning-box">
      ⚠️ write your passphrase down somewhere safe.
      if you forget it, your files cannot be recovered.
    </div>

    <label>create a passphrase</label>
    <input type="password" id="setupPass1" placeholder="something long and memorable" />

    <label>confirm passphrase</label>
    <input type="password" id="setupPass2" placeholder="type it again" />

    <button class="primary" onclick="createVault()">Create Vault</button>

    <div class="msg" id="setupMsg"></div>

  </div>

  <!-- ───────────────────────── -->
  <!-- UNLOCK                   -->
  <!-- ───────────────────────── -->
  <div id="unlockScreen">

    <label>enter your passphrase</label>
    <input type="password" id="unlockPass" placeholder="your passphrase" />

    <button class="primary" onclick="unlockVault()">Unlock</button>

    <div class="msg" id="unlockMsg"></div>

  </div>

  <!-- ───────────────────────── -->
  <!-- MAIN APP                 -->
  <!-- ───────────────────────── -->
  <div id="mainApp">

    <div class="status">vault is <span>unlocked</span></div>

    <!-- encrypt -->
    <div class="section">
      <h2>encrypt photos</h2>

      <input type="file" id="encFileInput" accept="image/*,.zip" multiple onchange="onEncFile(this)" />
      <div class="file-name" id="encFileName">no file selected</div>

      <button class="primary" id="encBtn" onclick="encryptFile()" disabled>encrypt + download</button>

      <div class="msg" id="encMsg"></div>
    </div>

    <hr />

    <!-- decrypt -->
    <div class="section">
      <h2>decrypt a photo</h2>

      <input type="file" id="decFileInput" accept=".enc" onchange="onDecFile(this)" />
      <div class="file-name" id="decFileName">no file selected</div>

      <button id="decBtn" onclick="decryptFile()" disabled>decrypt + view</button>

      <div class="msg" id="decMsg"></div>

      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="decrypted photo" />
        <div class="preview-name" id="previewName"></div>
      </div>
    </div>

    <hr />

    <button class="danger" onclick="lockVault()">lock vault</button>

  </div>

  <script src="argon2-bundled.min.js"></script>
  <script src="jszip.min.js"></script>
  <script>

    // ─────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────
    let globalKey         = null;
    let globalSalt        = null;
    let currentPassphrase = null;
    let encFiles          = null;
    let decFile           = null;

    // ─────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────
    window.onload = function () {
      if (localStorage.getItem('vaultReady') === 'true') {
        show('unlockScreen');
        document.getElementById('unlockPass').focus();
      } else {
        show('setupScreen');
        document.getElementById('setupPass1').focus();
      }
    };

    // ─────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────
    function show(id) {
      ['setupScreen', 'unlockScreen', 'mainApp'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg show ' + type;
    }

    function hideMsg(id) {
      document.getElementById(id).className = 'msg';
    }

    function triggerDownload(bytes, filename) {
      const url = URL.createObjectURL(new Blob([bytes]));
      const a   = document.createElement('a');
      a.href     = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─────────────────────────────────────────
    // ARGON2 KEY DERIVATION
    // ─────────────────────────────────────────
    async function deriveKey(passphrase, salt) {
      const result = await argon2.hash({
        pass:        passphrase,
        salt:        salt,
        type:        argon2.ArgonType.Argon2id,
        hashLen:     32,
        mem:         65536,
        time:        3,
        parallelism: 1
      });

      return await crypto.subtle.importKey(
        'raw',
        result.hash,
        { name: 'AES-GCM' },
        false,
        ['encrypt', 'decrypt']
      );
    }

    // ─────────────────────────────────────────
    // CREATE VAULT
    // ─────────────────────────────────────────
    async function createVault() {
      const p1 = document.getElementById('setupPass1').value;
      const p2 = document.getElementById('setupPass2').value;

      if (!p1)           return showMsg('setupMsg', 'please enter a passphrase.', 'err');
      if (p1.length < 8) return showMsg('setupMsg', 'passphrase must be at least 8 characters.', 'err');
      if (p1 !== p2)     return showMsg('setupMsg', "passphrases don't match.", 'err');

      showMsg('setupMsg', 'setting up vault...', 'ok');
      document.querySelector('#setupScreen button').disabled = true;

      try {
        globalSalt        = crypto.getRandomValues(new Uint8Array(16));
        globalKey         = await deriveKey(p1, globalSalt);
        currentPassphrase = p1;

        document.getElementById('setupPass1').value = '';
        document.getElementById('setupPass2').value = '';

        localStorage.setItem('vaultReady', 'true');
        show('mainApp');

      } catch (e) {
        showMsg('setupMsg', 'something went wrong. try again.', 'err');
        document.querySelector('#setupScreen button').disabled = false;
      }
    }

    // UNLOCK VAULT
    
    async function unlockVault() {
      const p = document.getElementById('unlockPass').value;
      if (!p) return showMsg('unlockMsg', 'enter your passphrase.', 'err');

      showMsg('unlockMsg', 'unlocking...', 'ok');
      document.querySelector('#unlockScreen button').disabled = true;

      try {
        globalSalt        = crypto.getRandomValues(new Uint8Array(16));
        globalKey         = await deriveKey(p, globalSalt);
        currentPassphrase = p;

        document.getElementById('unlockPass').value = '';
        show('mainApp');

      } catch (e) {
        showMsg('unlockMsg', 'something went wrong. try again.', 'err');
        document.querySelector('#unlockScreen button').disabled = false;
      }
    }

    // enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('setupScreen').style.display  === 'block') createVault();
      if (document.getElementById('unlockScreen').style.display === 'block') unlockVault();
    });

    // LOCK VAULT
   
    function lockVault() {
      globalKey         = null;
      globalSalt        = null;
      currentPassphrase = null;
      encFiles          = null;
      decFile           = null;

      document.getElementById('encFileName').textContent = 'no file selected';
      document.getElementById('decFileName').textContent = 'no file selected';
      document.getElementById('encBtn').disabled = true;
      document.getElementById('decBtn').disabled = true;
      document.getElementById('previewWrap').classList.remove('show');
      document.getElementById('previewImg').src = '';
      hideMsg('encMsg');
      hideMsg('decMsg');

      show('unlockScreen');
      document.getElementById('unlockPass').focus();
    }

  
    // FILE SELECTION
  
    function onEncFile(input) {
      if (input.files.length > 0) {
        encFiles = input.files;
        document.getElementById('encFileName').textContent =
          input.files.length === 1
            ? input.files[0].name
            : `${input.files.length} files selected`;
        document.getElementById('encBtn').disabled = false;
        hideMsg('encMsg');
      }
    }

    function onDecFile(input) {
      if (input.files[0]) {
        decFile = input.files[0];
        document.getElementById('decFileName').textContent = decFile.name;
        document.getElementById('decBtn').disabled = false;
        hideMsg('decMsg');
        document.getElementById('previewWrap').classList.remove('show');
      }
    }


    // CORE
    
    async function encryptBytes(fileBytes, key, salt) {
      const iv = crypto.getRandomValues(new Uint8Array(12));

      const encrypted = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        fileBytes
      );

      const out = new Uint8Array(16 + 12 + encrypted.byteLength);
      out.set(salt, 0);
      out.set(iv, 16);
      out.set(new Uint8Array(encrypted), 28);
      return out;
    }

  
    // ENCRYPT
 
    async function encryptFile() {
      if (!encFiles || !globalKey) return;

      const btn = document.getElementById('encBtn');
      btn.disabled    = true;
      btn.textContent = 'encrypting...';
      hideMsg('encMsg');

      try {
        const fileList = Array.from(encFiles);
        const isSingle = fileList.length === 1 && !fileList[0].name.toLowerCase().endsWith('.zip');

        if (isSingle) {
          // single image →  download the .enc file directly
          const bytes = await fileList[0].arrayBuffer();
          const enc   = await encryptBytes(bytes, globalKey, globalSalt);
          triggerDownload(enc, fileList[0].name + '.enc');
          showMsg('encMsg', 'done! save the .enc file to google drive.', 'ok');

        } else {
          // multiple files or ZIP → collect all .enc files into one zip
          const outputZip = new JSZip();
          let count = 0;

          for (const file of fileList) {
            if (file.name.toLowerCase().endsWith('.zip')) {
              // extract ZIP and encrypt each file inside
              const zip     = await JSZip.loadAsync(await file.arrayBuffer());
              const entries = Object.entries(zip.files).filter(([, f]) => !f.dir);

              for (const [name, entry] of entries) {
                const bytes = await entry.async('arraybuffer');
                const enc   = await encryptBytes(bytes, globalKey, globalSalt);
                outputZip.file(name + '.enc', enc);
                count++;
              }

            } else {
              // regular image
              const bytes = await file.arrayBuffer();
              const enc   = await encryptBytes(bytes, globalKey, globalSalt);
              outputZip.file(file.name + '.enc', enc);
              count++;
            }
          }

          // generate the zip and trigger one single download
          const zipBlob = await outputZip.generateAsync({ type: 'blob' });
          const url     = URL.createObjectURL(zipBlob);
          const a       = document.createElement('a');
          a.href        = url;
          a.download    = 'encrypted.zip';
          a.click();
          URL.revokeObjectURL(url);

          showMsg('encMsg', `done! ${count} file(s) bundled into encrypted.zip. save it to google drive.`, 'ok');
        }

      } catch (e) {
        showMsg('encMsg', 'encryption failed. try again.', 'err');
        console.error(e);
      }

      btn.textContent = 'encrypt + download';
      btn.disabled    = false;
    }

    // DECRYPT

    async function decryptFile() {
      if (!decFile) return;

      const btn = document.getElementById('decBtn');
      btn.disabled    = true;
      btn.textContent = 'decrypting...';
      hideMsg('decMsg');
      document.getElementById('previewWrap').classList.remove('show');

      try {
        const encBytes = new Uint8Array(await decFile.arrayBuffer());

        const salt    = encBytes.slice(0, 16);
        const iv      = encBytes.slice(16, 28);
        const encData = encBytes.slice(28);

        let decrypted;

        // try current session key first
        try {
          decrypted = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv },
            globalKey,
            encData
          );
        } catch {
          // different session
          if (!currentPassphrase) throw new Error('passphrase not in memory');
          const reKey = await deriveKey(currentPassphrase, salt);
          decrypted   = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv },
            reKey,
            encData
          );
        }

        // show decrypted photo
        const url = URL.createObjectURL(new Blob([decrypted]));
        document.getElementById('previewImg').src = url;
        document.getElementById('previewName').textContent = decFile.name.replace(/\.enc$/, '');
        document.getElementById('previewWrap').classList.add('show');

      } catch (e) {
        showMsg('decMsg', 'wrong passphrase or corrupted file.', 'err');
        console.error(e);
      }

      btn.textContent = 'decrypt + view';
      btn.disabled    = false;
    }

  </script>

</body>
</html>
